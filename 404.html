<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Page Not Found | Vincent Agana</title>
    <style>
        :root{font-family:"Segoe UI",Arial,sans-serif;color:#fff;background:#123f35}
        *{box-sizing:border-box}
        body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;
             background:radial-gradient(circle at 80% 15%,rgba(228,167,46,.35),transparent 25%),
             linear-gradient(135deg,#123f35,#25235a)}
        main{max-width:650px;text-align:center}
        .mark{width:76px;height:76px;margin:0 auto 24px;display:grid;place-items:center;
              border-radius:22px;background:linear-gradient(135deg,#176b57,#e1692d);font-weight:900;font-size:24px}
        h1{font-size:clamp(2.5rem,8vw,5rem);margin:.2em 0}
        p{color:rgba(255,255,255,.8);font-size:1.1rem}
        a{display:inline-block;margin-top:18px;padding:13px 20px;border-radius:999px;
          background:#ffd67b;color:#172030;font-weight:800;text-decoration:none}
    </style>
</head>
<body>
    <main>
        <div class="mark">VA</div>
        <p>Error 404</p>
        <h1>Page not found</h1>
        <p>The address may be incorrect or the page may have moved.</p>
        <a href="/portfolio/">Return to the portfolio</a>
    </main>
</body>
</html>
